  y-out-of-range: "<prefix><red>Y座標が範囲外です。<yellow><min></yellow>〜<yellow><max></yellow> で指定してください。</red>"

back:
  teleporting: "<prefix><green>直前の位置に戻ります。</green>"
  no-previous: "<prefix><red>戻れる位置がありません。</red>"

admin:
  home-list-header: "<prefix><green><player> のhome一覧 (<count>件):</green>"
  home-list-empty: "<prefix><yellow><player> にはhomeがありません。</yellow>"
  home-list-entry: "<prefix>  <yellow><home></yellow> - <world> (<x>, <y>, <z>)"
  home-deleted: "<prefix><green><player> の home <yellow><home></yellow> を削除しました。</green>"
  home-not-found: "<prefix><red><player> の home <yellow><home></yellow> は存在しません。</red>"
